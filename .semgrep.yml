rules:
  - id: no-eval
    patterns:
      - pattern: eval(...)
    message: Avoid eval - it introduces security and maintenance risk.
    languages: [javascript, typescript]
    severity: ERROR

  - id: no-child-process-exec
    patterns:
      - pattern-either:
          - pattern: exec(...)
          - pattern: execSync(...)
    message: Avoid exec/execSync in app code; prefer safer alternatives like execFile or spawn.
    languages: [javascript, typescript]
    severity: WARNING

  - id: no-hardcoded-secret-like-token
    patterns:
      - pattern-regex: "(?i)(api[_-]?key|secret|token)\\s*[:=]\\s*['\"`][A-Za-z0-9_\\-]{16,}['\"`]"
    message: Potential hardcoded secret detected.
    languages: [javascript, typescript]
    severity: ERROR
